<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoVallas Live Scoreboard - Responsivo</title>
    <style>
        /* Reseteo y Pantalla Completa */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .main-container {
            width: 100%;
            height: 100%; /* Se adapta al 100% de la pantalla */
            background-image: url('https://jxwdncxtnhmrufvdxuti.supabase.co/storage/v1/object/public/banners-publicos/2ESTADIO%201440X405.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* Modal Responsivo */
        #live-scoreboard {
            position: absolute;
            top: 5%;
            right: 5%;
            width: 25%; /* Ocupa el 25% del ancho de la pantalla */
            min-width: 260px; /* Evita que sea muy pequeño en celulares */
            max-width: 500px; /* Evita que sea gigante en pantallas ultrawide */
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 2%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            color: white;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Tipografía Fluida con clamp() para que se adapte sin romperse */
        .league-title {
            font-size: clamp(12px, 1.2vw, 24px);
            letter-spacing: 2px;
            color: #ffb380;
            text-transform: uppercase;
            font-weight: bold;
            text-align: center;
        }

        .teams-container {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
        }

        .team {
            flex: 1;
            text-align: center;
            overflow: hidden;
        }

        .team-name { 
            font-size: clamp(16px, 1.8vw, 36px);
            font-weight: 500; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .score-box {
            font-size: clamp(32px, 4vw, 72px);
            font-weight: 800;
            padding: 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .status-badge {
            background: #ff4d4d;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: clamp(10px, 1vw, 18px);
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="main-container" id="mainContainer">
    <div id="live-scoreboard">
        <div class="league-title" id="league">Buscando...</div>
        
        <div class="teams-container">
            <div class="team">
                <div class="team-name" id="name-home">---</div>
            </div>
            
            <div class="score-box">
                <span id="score-home">0</span>
                <span>-</span>
                <span id="score-away">0</span>
            </div>
            
            <div class="team">
                <div class="team-name" id="name-away">---</div>
            </div>
        </div>

        <div class="status-badge" id="match-time">ESPERANDO</div>
    </div>
</div>

<script>
    const API_KEY = '690e36f75b6ecdb00b829f1ff7db1bb2';
    const SPORTSDATA_REPLAY_KEY = 'c205613ba4364c6ea4ff21383902fcf6';
    
    // --- Lógica de APIs (Mismo funcionamiento, sin escudos) ---

    async function fetchAPIFootball() {
        try {
            const response = await fetch(`https://v3.football.api-sports.io/fixtures?live=all`, {
                method: "GET",
                headers: {
                    "x-rapidapi-key": API_KEY,
                    "x-rapidapi-host": "v3.football.api-sports.io"
                }
            });

            const data = await response.json();
            if (data.response && data.response.length > 0) {
                return data.response[0];
            }
            return null;
        } catch (error) {
            return null;
        }
    }

    async function getReplayTime() {
        try {
            const response = await fetch(`https://replay.sportsdata.io/api/metadata?key=${SPORTSDATA_REPLAY_KEY}`);
            const data = await response.json();
            return data.CurrentTime; 
        } catch (error) {
            return null;
        }
    }

    async function fetchSportsDataIO() {
        try {
            const replayTimeStr = await getReplayTime();
            if (!replayTimeStr) return null;

            const replayDate = replayTimeStr.split('T')[0];
            const url = `https://replay.sportsdata.io/api/v3/soccer/scores/json/GamesByDate/${replayDate}?key=${SPORTSDATA_REPLAY_KEY}`;
            const response = await fetch(url);
            const games = await response.json();
            
            if (games && games.length > 0) {
                const liveGame = games.find(game => 
                    game.Status === 'InProgress' || 
                    game.Status === 'Live' ||
                    game.Period > 0
                ) || games[0]; 
                
                return {
                    teams: {
                        home: { name: liveGame.HomeTeamName || 'Local' },
                        away: { name: liveGame.AwayTeamName || 'Visitante' }
                    },
                    goals: {
                        home: liveGame.HomeTeamScore || 0,
                        away: liveGame.AwayTeamScore || 0
                    },
                    league: { name: 'EPL REPLAY' },
                    fixture: {
                        status: { elapsed: liveGame.Clock || liveGame.Minute || 'LIVE' }
                    }
                };
            }
            return null;
        } catch (error) {
            return null;
        }
    }

    // --- Controlador Principal ---
    async function fetchPartidoEnVivo() {
        const match1 = await fetchAPIFootball();
        if (match1) {
            actualizarMarcador(match1);
            return;
        }
        
        const match2 = await fetchSportsDataIO();
        if (match2) {
            actualizarMarcador(match2);
            return;
        }
        
        // Partido de respaldo si no hay nada en vivo
        mostrarPartidoDePrueba();
    }

    // --- Actualización de la Interfaz ---
    function actualizarMarcador(match) {
        document.getElementById('name-home').innerText = match.teams.home.name;
        document.getElementById('name-away').innerText = match.teams.away.name;
        document.getElementById('score-home').innerText = match.goals.home ?? 0;
        document.getElementById('score-away').innerText = match.goals.away ?? 0;
        document.getElementById('league').innerText = match.league.name;
        document.getElementById('match-time').innerText = `${match.fixture.status.elapsed}'`;
    }

    // --- Mock Data ---
    function mostrarPartidoDePrueba() {
        const mockMatch = {
            teams: {
                home: { name: "América" },
                away: { name: "Cruz Azul" }
            },
            goals: {
                home: 2,
                away: 1
            },
            league: {
                name: 'LIGA MX (TEST)'
            },
            fixture: {
                status: { elapsed: '75' }
            }
        };
        actualizarMarcador(mockMatch);
    }

    // Inicializar
    function iniciarMarcador() {
        fetchPartidoEnVivo();
        setInterval(fetchPartidoEnVivo, 120000); // Actualiza cada 2 minutos
    }

    document.addEventListener('DOMContentLoaded', iniciarMarcador);
</script>

</body>
</html>
