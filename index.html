<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoVallas Live Scoreboard - Broadsign Local</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a; /* Fondo de respaldo */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .main-container {
            position: relative;
            width: 100vw;
            height: 28.125vw; 
            max-height: 100vh;
            /* Llama a la imagen local que estará en el mismo ZIP */
            background-image: url('fondo.jpg');
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        #live-scoreboard {
            position: absolute;
            top: 7%;
            right: 3%;
            width: 28%;
            height: 60%;
            background: rgba(0, 0, 0, 0.4);
            border: 0.1vw solid rgba(255, 255, 255, 0.2);
            border-radius: 1vw;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            padding: 1%;
            color: white;
            box-sizing: border-box;
        }

        .league-title {
            font-size: 1.1vw;
            letter-spacing: 0.1vw;
            color: #ffb380;
            text-transform: uppercase;
            font-weight: bold;
            text-align: center;
            margin: 0;
        }

        .teams-container {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
        }

        .team {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .team-logo { 
            width: 4.5vw;
            height: 4.5vw;
            object-fit: contain; 
            margin-bottom: 0.5vw; 
        }

        .team-name { 
            font-size: 1.2vw;
            font-weight: 500; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 95%;
        }

        .score-box {
            font-size: 4vw;
            font-weight: 800;
            padding: 0 2%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1vw;
        }

        .status-badge {
            background: #ff4d4d;
            padding: 0.4vw 1.2vw;
            border-radius: 2vw;
            font-size: 0.9vw;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div id="live-scoreboard">
        <div class="league-title" id="league">Cargando...</div>
        
        <div class="teams-container">
            <div class="team">
                <img id="logo-home" class="team-logo" src="" alt="">
                <div class="team-name" id="name-home">---</div>
            </div>
            
            <div class="score-box">
                <span id="score-home">0</span>
                <span>-</span>
                <span id="score-away">0</span>
            </div>
            
            <div class="team">
                <img id="logo-away" class="team-logo" src="" alt="">
                <div class="team-name" id="name-away">---</div>
            </div>
        </div>

        <div class="status-badge" id="match-time">ESPERANDO</div>
    </div>
</div>

<script>
    const API_KEY = 'df5609d0e946867dbc1d600dfbe24684';

    async function fetchCualquierPartidoEnVivo() {
        try {
            const response = await fetch(`https://v3.football.api-sports.io/fixtures?live=all`, {
                method: "GET",
                headers: {
                    "x-rapidapi-key": API_KEY,
                    "x-rapidapi-host": "v3.football.api-sports.io"
                }
            });

            const data = await response.json();
            
            if (data.response && data.response.length > 0) {
                const match = data.response[0];

                document.getElementById('name-home').innerText = match.teams.home.name;
                document.getElementById('name-away').innerText = match.teams.away.name;
                
                if(match.teams.home.logo) document.getElementById('logo-home').src = match.teams.home.logo;
                if(match.teams.away.logo) document.getElementById('logo-away').src = match.teams.away.logo;

                document.getElementById('score-home').innerText = match.goals.home ?? 0;
                document.getElementById('score-away').innerText = match.goals.away ?? 0;

                document.getElementById('league').innerText = match.league.name;
                document.getElementById('match-time').innerText = `${match.fixture.status.elapsed}' LIVE`;
            } else {
                document.getElementById('league').innerText = "SIN PARTIDOS EN VIVO";
                document.getElementById('match-time').innerText = "ESPERANDO...";
                document.getElementById('name-home').innerText = "---";
                document.getElementById('name-away').innerText = "---";
                document.getElementById('score-home').innerText = "0";
                document.getElementById('score-away').innerText = "0";
                document.getElementById('logo-home').src = "";
                document.getElementById('logo-away').src = "";
            }
        } catch (error) {
            console.error("Error API:", error);
            document.getElementById('league').innerText = "ERROR DE CONEXIÓN";
        }
    }

    function iniciarMarcador() {
        fetchCualquierPartidoEnVivo();
        setInterval(fetchCualquierPartidoEnVivo, 120000);
    }

    document.addEventListener('DOMContentLoaded', iniciarMarcador);
</script>

</body>
</html>
